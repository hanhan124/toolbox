name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Get signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $keyPath = "$env:TEMP\mynx.key"
          # Use .NET to write exactly the secret bytes (no BOM, no extra newline, no CRLF mangling)
          [System.IO.File]::WriteAllText($keyPath, $env:TAURI_SIGNING_PRIVATE_KEY, [System.Text.Encoding]::ASCII)
          $len = (Get-Item $keyPath).Length
          Write-Host "Key file written: $keyPath ($len bytes)"
          if ($len -eq 0) {
            Write-Host "::warning::Key file is EMPTY — secret TAURI_SIGNING_PRIVATE_KEY is unset or blank"
          } else {
            $lines = (Get-Content $keyPath).Count
            Write-Host "Key file has $lines line(s)"
          }
          echo "key_path=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.key_path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Prepare portable build & latest.json
        shell: pwsh
        env:
          KEY_PATH: ${{ env.key_path }}
          SIGN_PWD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Continue'

          $pkg = Get-Content "package.json" | ConvertFrom-Json
          $version = $pkg.version
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $releaseDir = "src-tauri\target\release"

          Write-Host "==> Version: $version"
          Write-Host "==> NSIS bundle contents:"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir | ForEach-Object { Write-Host "    $($_.Name)" }
          } else {
            Write-Host "    (nsis dir missing)"
          }

          # --- NSIS installer + signature (report whether build signed it) ---
          $nsisExe = Get-ChildItem "$nsisDir\Mynx*_setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisSig = Get-ChildItem "$nsisDir\Mynx*_setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisSig) {
            Write-Host "==> NSIS setup is SIGNED (sig present)"
          } else {
            Write-Host "==> NSIS setup is NOT signed (no .sig) — updater signature will be missing"
          }

          # --- Portable exe: copy + sign via env var (NOT -k <path>) ---
          $portableSrc = Get-ChildItem "$releaseDir\mynx.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $portableDest = "$releaseDir\Mynx_${version}_portable.exe"

          if ($portableSrc) {
            Copy-Item $portableSrc.FullName $portableDest -Force
            Write-Host "==> Signing portable exe (passing key as env var, not path)..."
            # Feed the key CONTENT via env var so tauri doesn't try to base64-decode a file path
            $env:TAURI_SIGNING_PRIVATE_KEY = [System.IO.File]::ReadAllText($env:KEY_PATH)
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = $env:SIGN_PWD
            & npx tauri signer sign "$portableDest"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "    ! portable signing returned exit code $LASTEXITCODE (ignored)"
            } else {
              Write-Host "    portable signing OK"
            }
          } else {
            Write-Host "==> No portable source exe found, skipping portable target"
          }

          # --- Sizes ---
          $nsisSize = if ($nsisExe) { (Get-Item $nsisExe.FullName).Length } else { 0 }
          $portableSize = if (Test-Path $portableDest) { (Get-Item $portableDest).Length } else { 0 }

          # --- latest.json (two download entries) ---
          $today = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          $ghBase = "https://github.com/hanhan124/mynx/releases/download/v${version}"

          $jsonObj = [ordered]@{
            version = $version
            date = $today
            notes = "See the GitHub Release for full changelog."
            body = ""
            downloads = @(
              [ordered]@{
                name = "Mynx_${version}_x64-setup.exe"
                signature = "$ghBase/Mynx_${version}_x64-setup.exe.sig"
                url = "$ghBase/Mynx_${version}_x64-setup.exe"
                size = $nsisSize
              },
              [ordered]@{
                name = "Mynx_${version}_portable.exe"
                signature = "$ghBase/Mynx_${version}_portable.exe.sig"
                url = "$ghBase/Mynx_${version}_portable.exe"
                size = $portableSize
              }
            )
          }

          $jsonStr = $jsonObj | ConvertTo-Json -Depth 4 -Compress
          $latestJsonPath = "$releaseDir\latest.json"
          $jsonStr | Out-File -FilePath $latestJsonPath -Encoding UTF8
          Write-Host "==> latest.json written:"
          Write-Host $jsonStr

          # --- Persist paths for next step ---
          "latest_json_path=$latestJsonPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append
          "portable_dest=$portableDest" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append

      - name: Collect release assets
        shell: pwsh
        run: |
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $assets = New-Object System.Collections.Generic.List[string]

          $exe = Get-ChildItem "$nsisDir\Mynx*_setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sig = Get-ChildItem "$nsisDir\Mynx*_setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) { $assets.Add($exe.FullName) }
          if ($sig) { $assets.Add($sig.FullName) }
          if ($env:latest_json_path -and (Test-Path $env:latest_json_path)) { $assets.Add($env:latest_json_path) }
          if ($env:portable_dest -and (Test-Path $env:portable_dest)) { $assets.Add($env:portable_dest) }
          $portableSig = "$env:portable_dest.sig"
          if (Test-Path $portableSig) { $assets.Add($portableSig) }

          Write-Host "==> Assets to upload:"
          $assets | ForEach-Object { Write-Host "    $_" }

          $joined = ($assets -join ',')
          "files=$joined" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
