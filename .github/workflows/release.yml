name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Import signing key (if configured)
        id: import_key
        shell: pwsh
        run: |
          $key = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          if ([string]::IsNullOrEmpty($key)) {
            Write-Host "::warning::TAURI_SIGNING_PRIVATE_KEY secret not set — build will skip signing"
            "KEY_AVAILABLE=false" >> $env:GITHUB_ENV
          } else {
            $keyPath = Join-Path $env:RUNNER_TEMP "mynx-signing.key"
            [System.IO.File]::WriteAllText($keyPath, $key, [System.Text.UTF8Encoding]::new($false))
            $size = (Get-Item $keyPath).Length
            Write-Host "Signing key written ($size bytes)"
            "KEY_AVAILABLE=true" >> $env:GITHUB_ENV
            "TAURI_SIGNING_PRIVATE_KEY_PATH=$keyPath" >> $env:GITHUB_ENV
          }

      - name: Build (NSIS installer)
        shell: pwsh
        run: |
          npm run tauri build
          if ($LASTEXITCODE -ne 0) { throw "tauri build failed with exit code $LASTEXITCODE" }
          Write-Host "==> Build done. Bundle contents:"
          $nsis = "src-tauri\target\release\bundle\nsis"
          if (Test-Path $nsis) {
            Get-ChildItem $nsis | ForEach-Object { Write-Host "    $($_.Name)  ($($_.Length) bytes)" }
          } else {
            Write-Host "::warning::NSIS bundle directory not found!"
            Get-ChildItem "src-tauri\target\release\bundle" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "    bundle/: $($_.Name)" }
          }

      - name: Prepare release assets
        id: assets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Continue'

          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $version = $pkg.version
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $releaseDir = "src-tauri\target\release"
          $keyPath = $env:TAURI_SIGNING_PRIVATE_KEY_PATH
          $keyPassword = $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD

          Write-Host "==> Preparing assets for version $version"

          # 1. NSIS installer + .sig
          $nsisExe = Get-ChildItem "$nsisDir\Mynx*_setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisSig = Get-ChildItem "$nsisDir\Mynx*_setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisExe) {
            Write-Host "==> NSIS installer found: $($nsisExe.Name) ($($nsisExe.Length) bytes)"
          } else {
            Write-Host "==> NSIS installer NOT found"
          }
          if ($nsisSig) {
            Write-Host "==> NSIS setup IS signed: $($nsisSig.Name)"
          } else {
            Write-Host "==> NSIS setup NOT signed — auto-update will not work"
          }

          # 2. Portable exe
          $portableSrc = Get-ChildItem "$releaseDir\mynx.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $portableDest = "$releaseDir\Mynx_${version}_portable.exe"

          if ($portableSrc) {
            Copy-Item $portableSrc.FullName $portableDest -Force
            Write-Host "==> Portable exe copied: $portableDest"

            if ($env:KEY_AVAILABLE -eq 'true' -and $keyPath -and (Test-Path $keyPath) -and $keyPassword) {
              Write-Host "==> Signing portable exe..."
              & npx tauri signer sign -f "$keyPath" -p "$keyPassword" "$portableDest"
              if ($LASTEXITCODE -eq 0) {
                Write-Host "    Portable signing OK"
              } else {
                Write-Host "    Portable signing failed (exit $LASTEXITCODE), continuing anyway"
              }
            } else {
              Write-Host "==> No key file or password, skipping portable signing"
            }
          } else {
            Write-Host "::warning::mynx.exe not found in $releaseDir"
          }

          # 3. latest.json
          $nsisSigContent = ""
          if ($nsisSig -and (Test-Path $nsisSig.FullName)) {
            $nsisSigContent = (Get-Content $nsisSig.FullName -Raw).Trim()
          }

          $ghBase = "https://github.com/hanhan124/mynx/releases/download/v${version}"
          $today = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $jsonObj = [ordered]@{
            version = $version
            date = $today
            notes = "See the GitHub Release for full changelog."
            body = ""
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                url = "$ghBase/Mynx_${version}_x64-setup.exe"
                signature = $nsisSigContent
              }
            }
            portableUrl = "$ghBase/Mynx_${version}_portable.exe"
          }

          $jsonStr = $jsonObj | ConvertTo-Json -Depth 4 -Compress
          $latestJsonPath = "$releaseDir\latest.json"
          [System.IO.File]::WriteAllText($latestJsonPath, $jsonStr, [System.Text.UTF8Encoding]::new($false))
          Write-Host "==> latest.json:"
          Write-Host $jsonStr

          # 4. Collect assets
          $assets = @()
          if ($nsisExe) { $assets += $nsisExe.FullName }
          if ($nsisSig) { $assets += $nsisSig.FullName }
          if ($portableSrc -and (Test-Path $portableDest)) { $assets += $portableDest }
          $portableSig = "$portableDest.sig"
          if (Test-Path $portableSig) { $assets += $portableSig }
          if (Test-Path $latestJsonPath) { $assets += $latestJsonPath }

          Write-Host "==> Final assets to upload:"
          $assets | ForEach-Object { Write-Host "    $_" }

          "ASSETS<<EOF" >> $env:GITHUB_ENV
          ($assets -join "`n") >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ env.ASSETS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
