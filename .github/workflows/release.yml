name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Get signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $keyPath = "$env:TEMP\mynx.key"
          $env:TAURI_SIGNING_PRIVATE_KEY | Out-File -FilePath $keyPath -Encoding ASCII
          echo "key_path=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.key_path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Generate latest.json with both targets
        id: latest-json
        shell: pwsh
        run: |
          $pkg = Get-Content "package.json" | ConvertFrom-Json
          $version = $pkg.version
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $releaseDir = "src-tauri\target\release"

          # Find NSIS installer and its signature
          $nsisExe = Get-ChildItem "$nsisDir\Mynx*_setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisSig = Get-ChildItem "$nsisDir\Mynx*_setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1

          # Find portable exe and sign it
          $portableSrc = Get-ChildItem "$releaseDir\mynx.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $portableDest = "$releaseDir\Mynx_${version}_portable.exe"
          $portableSigPath = "$portableDest.sig"

          if ($portableSrc) {
            Copy-Item $portableSrc.FullName $portableDest -Force
            # Sign the portable exe
            npx tauri signer sign -k "$env:key_path" -p "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" "$portableDest" 2>$null | Out-Null
          }

          # Get file sizes
          $nsisSize = if ($nsisExe) { (Get-Item $nsisExe.FullName).Length } else { 0 }
          $portableSize = if (Test-Path $portableDest) { (Get-Item $portableDest).Length } else { 0 }

          # Build latest.json with both download entries
          $today = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          $ghBase = "https://github.com/hanhan124/mynx/releases/download/v${version}"

          $nsisUrl = "$ghBase/Mynx_${version}_x64-setup.exe"
          $nsisSigUrl = "$ghBase/Mynx_${version}_x64-setup.exe.sig"
          $portableUrl = "$ghBase/Mynx_${version}_portable.exe"
          $portableSigUrl = "$ghBase/Mynx_${version}_portable.exe.sig"

          $jsonObj = [ordered]@{
            version = $version
            date = $today
            notes = "See the GitHub Release for full changelog."
            body = ""
            downloads = @(
              [ordered]@{
                name = "Mynx_${version}_x64-setup.exe"
                signature = $nsisSigUrl
                url = $nsisUrl
                size = $nsisSize
              },
              [ordered]@{
                name = "Mynx_${version}_portable.exe"
                signature = $portableSigUrl
                url = $portableUrl
                size = $portableSize
              }
            )
          }

          $jsonStr = $jsonObj | ConvertTo-Json -Depth 4 -Compress
          $latestJsonPath = "$releaseDir\latest.json"
          $jsonStr | Out-File -FilePath $latestJsonPath -Encoding UTF8

          echo "latest_json_path=$latestJsonPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII
          echo "portable_dest=$portableDest" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $releaseDir = "src-tauri\target\release"
          $pkg = Get-Content "package.json" | ConvertFrom-Json
          $version = $pkg.version

          # NSIS installer + signature
          $exe = Get-ChildItem "$nsisDir\Mynx*_setup.exe" | Select-Object -First 1
          $sig = Get-ChildItem "$nsisDir\Mynx*_setup.exe.sig" | Select-Object -First 1

          $assets = @()
          if ($exe)    { $assets += $exe.FullName }
          if ($sig)    { $assets += $sig.FullName }
          if (Test-Path $env:latest_json_path) { $assets += $env:latest_json_path }
          if (Test-Path $env:portable_dest) { $assets += $env:portable_dest }
          $portableSig = "$env:portable_dest.sig"
          if (Test-Path $portableSig) { $assets += $portableSig }

          $joined = $assets -join ','
          echo "files=$joined" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
